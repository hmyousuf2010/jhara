# cbindgen.toml — jhara-core
#
# Configuration for C header generation.
# `build.rs` passes an equivalent `cbindgen::Config` struct; this file is the
# human-readable source of truth and is also usable via `cbindgen --config`.

language = "C"
cpp_compat = false
tab_width = 4
documentation = true
documentation_style = "c99"
usize_is_size_t = true
include_version = true

autogen_warning = "/* DO NOT EDIT — generated by cbindgen from crates/jhara-core */"
include_guard = "JHARA_CORE_H"

header = """
#include <stdint.h>
#include <stddef.h>
#include <stdbool.h>
"""

# Only export items from the ffi module.
include = ["ffi"]

# Emit static_assert size checks so Swift compilation catches layout drift.
[export]
include = ["ScanNodeC", "ScanNodeBatchC", "JharaScanHandle"]
exclude = []

[struct]
derive_eq = false
derive_neq = false
# Emit a static_assert for struct sizes (requires C11 or later).
generate_typedef = false
