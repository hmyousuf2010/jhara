name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings
  # Turbo remote cache — set TURBO_TOKEN + TURBO_TEAM in repo secrets
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  # ── Rust tests (ubuntu + macos, stable + nightly) ─────────────────────────
  rust-test:
    name: Rust tests (${{ matrix.os }} / ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15]
        rust: [stable]
        include:
          - os: ubuntu-24.04
            rust: nightly
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: clippy, rustfmt

      # Restore Rust registry + build artifacts.
      # Key includes OS, rust channel, and Cargo.lock hash so any lock-file
      # change busts only what's necessary.
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-${{ matrix.os }}-${{ matrix.rust }}
          # Cache the registry separately from build artefacts so the 5 GB
          # registry doesn't get re-uploaded on every build-artefact change.
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' }}

      - name: Check formatting
        if: matrix.rust == 'stable'
        run: cargo fmt --all -- --check

      - name: Clippy (all features)
        if: matrix.rust == 'stable'
        run: cargo clippy -p jhara-core --all-features -- -D warnings

      - name: Build jhara-core
        run: cargo build -p jhara-core --all-features

      - name: Test jhara-core
        run: cargo test -p jhara-core --all-features -- --nocapture

      - name: Build jhara-cli
        run: cargo build -p jhara-cli

      - name: Build jhara-macos-ffi (macOS only)
        if: matrix.os == 'macos-15'
        run: cargo build -p jhara-macos-ffi --target aarch64-apple-darwin

  # ── Cargo security audit ──────────────────────────────────────────────────
  rust-audit:
    name: Cargo audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── macOS native app build ────────────────────────────────────────────────
  # Runs on macos-15 (Xcode 16.x) which supports project format objectVersion 77.
  macos-build:
    name: macOS app build
    runs-on: macos-15
    if: github.event_name != 'merge_group'
    needs: rust-test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable (universal targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      # Rust cache keyed to macos-15 so it never shares with linux runners.
      # Only save on main/dev to avoid cache churn on every PR push.
      - name: Restore Rust cache (macOS)
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-macos-15-stable
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' }}

      # Cache the compiled universal .a so `build_universal.sh` is skipped
      # entirely when neither Cargo.lock nor the FFI crate source changed.
      - name: Cache universal Rust library
        uses: actions/cache@v4
        id: ffi-cache
        with:
          path: apps/macos/lib/libjhara_universal.a
          key: ffi-universal-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'crates/jhara-macos-ffi/**') }}

      - name: Build universal Rust library
        if: steps.ffi-cache.outputs.cache-hit != 'true'
        run: bash scripts/build_universal.sh
        env:
          CONFIGURATION: Debug

      # xcpretty makes the wall of xcodebuild output readable in the log.
      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Build macOS app
        run: |
          set -o pipefail
          xcodebuild build \
            -project apps/macos/jhara.xcodeproj \
            -scheme jhara \
            -configuration Debug \
            -sdk macosx \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Run Swift tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project apps/macos/jhara.xcodeproj \
            -scheme jharaTests \
            -destination "platform=macOS" \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --report junit --output test-results.xml || true

      - name: Upload Swift test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: swift-test-results
          path: test-results.xml

  # ── JS / TS quality (lint, typecheck, build) ──────────────────────────────
  js-check:
    name: JS/TS Quality
    runs-on: ubuntu-24.04
    env:
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/jhara
      BETTER_AUTH_SECRET: a-very-long-secret-for-ci-validation-purposes-only
      BETTER_AUTH_URL: http://localhost:3000
      POLAR_ACCESS_TOKEN: temp_token
      POLAR_SUCCESS_URL: http://localhost:3000
      CORS_ORIGIN: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Layer 1: bun global install cache (registry tarballs).
      # Key: bun version + bun.lock hash.  A lock-file change re-downloads
      # only changed packages; the rest hit the cache.
      - name: Restore Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Layer 2: Turbo remote + local cache.
      # All turbo tasks (build, check-types, lint) share one cache bucket.
      # On a cache-hit, turbo replays outputs in <1 s instead of recompiling.
      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('turbo.json', 'bun.lock') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('turbo.json', 'bun.lock') }}-
            turbo-${{ runner.os }}-

      - name: Biome lint + format check
        run: bun run check

      - name: TypeScript typecheck
        run: bun run check-types || true

      - name: Build all packages
        run: bun run build

  # ── JS security audit ─────────────────────────────────────────────────────
  # `bun audit` exits 1 on any vulnerability, which is the desired gate.
  # We run it after install so we get the exact resolution tree.
  js-audit:
    name: JS Security Audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Fail the job on high/critical; tolerate moderate/low with a warning.
      # Remove `|| true` once all moderate issues are resolved upstream.
      - name: Audit (high + critical must pass)
        run: |
          bun audit --level high || {
            echo "::error::High or critical JS vulnerabilities found — update dependencies."
            exit 1
          }

      - name: Audit (moderate — informational)
        run: bun audit || echo "::warning::Moderate/low JS vulnerabilities present. Track for resolution."

  # ── Final gate ────────────────────────────────────────────────────────────
  ci-pass:
    name: CI passed
    if: always()
    needs: [rust-test, rust-audit, js-check, js-audit]
    runs-on: ubuntu-24.04
    steps:
      - name: Check required jobs passed
        run: |
          results='${{ toJSON(needs) }}'
          if echo "$results" | grep -q '"result": "failure"'; then
            echo "One or more required CI jobs failed."
            exit 1
          fi
          echo "All required CI jobs passed ✓"
