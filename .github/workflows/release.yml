name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Validate tag format ───────────────────────────────────────────────────
  validate:
    name: Validate release tag
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          echo "version=${TAG}" >> $GITHUB_OUTPUT
          if [[ "$TAG" == *"-"* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

  # ── Run full CI suite first ───────────────────────────────────────────────
  ci:
    name: Run CI before release
    needs: validate
    uses: ./.github/workflows/ci.yml

  # ── Build macOS app ───────────────────────────────────────────────────────
  build-macos:
    name: Build macOS app
    runs-on: macos-14
    needs: ci
    environment: release
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: jhara-release-macos

      - name: Import Developer ID certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}

      - name: Build universal Rust library (release)
        run: bash scripts/build_universal.sh
        env:
          CONFIGURATION: Release

      - name: Build macOS app (archive)
        run: |
          xcodebuild archive \
            -project apps/macos/jhara.xcodeproj \
            -scheme jhara \
            -configuration Release \
            -archivePath jhara.xcarchive \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            CODE_SIGN_STYLE=Manual

      - name: Export archive
        run: |
          cat > export_options.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Developer ID Application</string>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath jhara.xcarchive \
            -exportPath export/ \
            -exportOptionsPlist export_options.plist

      - name: Notarize app
        run: |
          ditto -c -k --keepParent export/jhara.app jhara-notarize.zip
          xcrun notarytool submit jhara-notarize.zip \
            --apple-id ${{ secrets.APPLE_ID }} \
            --password ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }} \
            --team-id ${{ secrets.APPLE_TEAM_ID }} \
            --wait

      - name: Staple notarization
        run: xcrun stapler staple export/jhara.app

      - name: Create DMG
        run: |
          npm install -g create-dmg
          create-dmg \
            --volname "Jhara" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 100 \
            --icon "jhara.app" 180 180 \
            --hide-extension "jhara.app" \
            --app-drop-link 480 180 \
            "Jhara-${{ needs.validate.outputs.version }}.dmg" \
            "export/"

      - name: Sign DMG
        run: |
          codesign --sign "Developer ID Application: ${{ secrets.DEVELOPER_NAME }}" \
            "Jhara-${{ needs.validate.outputs.version }}.dmg"

      - name: Upload macOS DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: "Jhara-${{ needs.validate.outputs.version }}.dmg"
          retention-days: 7

  # ── Build Linux packages ──────────────────────────────────────────────────
  build-linux:
    name: Build Linux packages
    runs-on: ubuntu-24.04
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: jhara-release-linux

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app (Linux)
        run: bun tauri build
        working-directory: apps/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          retention-days: 7

  # ── Build Windows installer ───────────────────────────────────────────────
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: jhara-release-windows

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app (Windows)
        run: bun tauri build
        working-directory: apps/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
          retention-days: 7

  # ── Create GitHub release ─────────────────────────────────────────────────
  release:
    name: Create GitHub release
    runs-on: ubuntu-24.04
    needs: [validate, build-macos, build-linux, build-windows]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: List artifacts
        run: find release-artifacts/ -type f | sort

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "Jhara v${{ needs.validate.outputs.version }}"
          prerelease: ${{ needs.validate.outputs.prerelease }}
          generate_release_notes: true
          files: |
            release-artifacts/macos-dmg/*.dmg
            release-artifacts/linux-packages/*.deb
            release-artifacts/linux-packages/*.AppImage
            release-artifacts/windows-installer/*.exe
            release-artifacts/windows-installer/*.msi
