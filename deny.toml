[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    "RUSTSEC-2024-0375", # atty is unmaintained (transitive dependency via clap/cbindgen)
    "RUSTSEC-2025-0119", # number_prefix is unmaintained (transitive dependency via indicatif)
]

[licenses]
# Acceptable licenses for dependencies
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-2-Clause-Patent",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "MPL-2.0",
]
# Confidence threshold for license detection
confidence-threshold = 0.8

[[licenses.exceptions]]
# plist crate uses a custom Apple license for the plist format spec
allow = ["LicenseRef-Apple-Plist"]
crate = "plist"

[bans]
# Don't allow multiple versions of the same crate unless explicitly listed
multiple-versions = "warn"
# Don't allow wildcard dependencies in workspace members
wildcards = "deny"
highlight = "all"

# Crates we specifically don't want anywhere in the tree
deny = [
    # No OpenSSL — use rustls everywhere
    { crate = "openssl", reason = "Use rustls instead. OpenSSL is a pain to cross-compile and link." },
    { crate = "openssl-sys", reason = "Use rustls instead." },
]

# Allow specific duplicate versions we can't avoid
skip = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
